<svg width="860" height="480" viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
      * { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 16px; font-weight: 600; fill: #ffffff; }
      .subtitle { font-size: 13px; font-weight: 500; fill: #ffffff; }
      .label { font-size: 12px; font-weight: 400; fill: #a0aec0; }
      .section-title { font-size: 14px; font-weight: 600; fill: #ffffff; }
    </style>

    <!-- Gradients for subtle depth -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>

    <!-- Icons as simple shapes -->
    <symbol id="chart-icon" viewBox="0 0 16 16">
      <rect x="2" y="8" width="2" height="6" fill="#06b6d4" opacity="0.8"/>
      <rect x="6" y="5" width="2" height="9" fill="#06b6d4" opacity="0.8"/>
      <rect x="10" y="3" width="2" height="11" fill="#06b6d4" opacity="0.8"/>
    </symbol>

    <symbol id="lock-icon" viewBox="0 0 16 16">
      <rect x="4" y="8" width="8" height="6" rx="1" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <path d="M 6 8 V 5 A 2 2 0 0 1 10 5 V 8" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="8" cy="11" r="1" fill="#10b981"/>
    </symbol>

    <symbol id="arrow-down" viewBox="0 0 24 24">
      <path d="M12 5v14M12 19l-5-5M12 19l5-5" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>
  </defs>

  <!-- Main background -->
  <rect width="860" height="480" fill="#0a1628"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0f1d32" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="860" height="480" fill="url(#grid)" opacity="0.3"/>

  <!-- LEFT SIDE: Data Inputs -->
  <g id="inputs">
    <!-- Input section background -->
    <rect x="10" y="140" width="120" height="200" rx="8" fill="#0f1d32" opacity="0.4" stroke="#06b6d4" stroke-width="1"/>

    <!-- Title -->
    <text x="70" y="165" text-anchor="middle" class="section-title" font-size="12">Inputs</text>

    <!-- Input boxes -->
    <rect x="20" y="180" width="100" height="35" rx="4" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="70" y="205" text-anchor="middle" class="label">Excel Uploads</text>

    <rect x="20" y="225" width="100" height="35" rx="4" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="70" y="250" text-anchor="middle" class="label">CSV Imports</text>

    <rect x="20" y="270" width="100" height="35" rx="4" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="70" y="295" text-anchor="middle" class="label">Manual Entry</text>
  </g>

  <!-- RIGHT SIDE: Data Outputs -->
  <g id="outputs">
    <!-- Output section background -->
    <rect x="730" y="140" width="120" height="200" rx="8" fill="#0f1d32" opacity="0.4" stroke="#10b981" stroke-width="1"/>

    <!-- Title -->
    <text x="790" y="165" text-anchor="middle" class="section-title" font-size="12">Outputs</text>

    <!-- Output boxes -->
    <rect x="740" y="180" width="100" height="35" rx="4" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="790" y="205" text-anchor="middle" class="label">Dashboards</text>

    <rect x="740" y="225" width="100" height="35" rx="4" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="790" y="250" text-anchor="middle" class="label">Weekly Charts</text>

    <rect x="740" y="270" width="100" height="35" rx="4" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="790" y="295" text-anchor="middle" class="label">Print-ready Excel</text>
  </g>

  <!-- MAIN ARCHITECTURE LAYERS -->

  <!-- TOP LAYER: Frontend -->
  <g id="frontend-layer">
    <rect x="160" y="30" width="540" height="100" rx="12" fill="url(#darkBg)" stroke="#06b6d4" stroke-width="2"/>

    <!-- Layer label -->
    <text x="430" y="55" text-anchor="middle" class="title">Frontend Layer</text>

    <!-- Component boxes -->
    <rect x="175" y="70" width="110" height="50" rx="6" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="230" y="92" text-anchor="middle" class="subtitle">React 18</text>
    <text x="230" y="108" text-anchor="middle" class="label" font-size="11">+ Vite</text>

    <rect x="305" y="70" width="110" height="50" rx="6" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="360" y="97" text-anchor="middle" class="subtitle">Tailwind CSS</text>

    <rect x="435" y="70" width="110" height="50" rx="6" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="490" y="92" text-anchor="middle" class="subtitle">Recharts</text>
    <use href="#chart-icon" x="480" y="110" width="14" height="14"/>

    <rect x="565" y="70" width="110" height="50" rx="6" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="620" y="97" text-anchor="middle" class="subtitle">React Router</text>
  </g>

  <!-- Arrow down 1 -->
  <line x1="430" y1="130" x2="430" y2="160" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowhead-cyan)"/>

  <!-- Arrow marker for cyan -->
  <defs>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#06b6d4"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#10b981"/>
    </marker>
  </defs>

  <!-- MIDDLE LAYER: API Layer -->
  <g id="api-layer">
    <rect x="160" y="160" width="540" height="100" rx="12" fill="url(#darkBg)" stroke="#22c55e" stroke-width="2"/>

    <!-- Layer label -->
    <text x="430" y="185" text-anchor="middle" class="title">API Layer</text>

    <!-- Component boxes -->
    <rect x="175" y="200" width="140" height="50" rx="6" fill="#0a1628" stroke="#22c55e" stroke-width="1.5"/>
    <text x="245" y="225" text-anchor="middle" class="subtitle">FastAPI</text>

    <rect x="335" y="200" width="140" height="50" rx="6" fill="#0a1628" stroke="#22c55e" stroke-width="1.5"/>
    <text x="405" y="225" text-anchor="middle" class="subtitle">Pydantic Models</text>

    <rect x="495" y="200" width="180" height="50" rx="6" fill="#0a1628" stroke="#22c55e" stroke-width="1.5"/>
    <text x="585" y="225" text-anchor="middle" class="subtitle">10 Route Modules</text>
  </g>

  <!-- Arrow down 2 -->
  <line x1="430" y1="260" x2="430" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- BOTTOM LAYER: Data Layer -->
  <g id="data-layer">
    <rect x="160" y="290" width="540" height="100" rx="12" fill="url(#darkBg)" stroke="#10b981" stroke-width="2"/>

    <!-- Layer label -->
    <text x="430" y="315" text-anchor="middle" class="title">Data Layer</text>

    <!-- Component boxes -->
    <rect x="175" y="330" width="150" height="50" rx="6" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="250" y="355" text-anchor="middle" class="subtitle">Supabase</text>
    <text x="250" y="370" text-anchor="middle" class="label" font-size="11">(PostgreSQL)</text>

    <rect x="345" y="330" width="150" height="50" rx="6" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="420" y="350" text-anchor="middle" class="subtitle">Row Level</text>
    <text x="420" y="365" text-anchor="middle" class="subtitle">Security</text>
    <use href="#lock-icon" x="405" y="330" width="14" height="14"/>

    <rect x="515" y="330" width="170" height="50" rx="6" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="600" y="355" text-anchor="middle" class="subtitle">Alias Engine</text>
  </g>

  <!-- Input arrows TO frontend -->
  <line x1="130" y1="80" x2="160" y2="80" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="160,80 150,75 150,85" fill="#06b6d4"/>

  <!-- Output arrows FROM frontend -->
  <line x1="700" y1="80" x2="730" y2="80" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="730,80 720,75 720,85" fill="#10b981"/>

  <!-- Input arrows TO API -->
  <line x1="130" y1="210" x2="160" y2="210" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  <polygon points="160,210 150,205 150,215" fill="#06b6d4" opacity="0.6"/>

  <!-- Output arrows FROM Data -->
  <line x1="700" y1="340" x2="730" y2="340" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  <polygon points="730,340 720,335 720,345" fill="#10b981" opacity="0.6"/>

  <!-- Bottom connectors for flow visualization -->
  <g id="flow-indicators">
    <!-- Input flow from left -->
    <path d="M 130 240 Q 145 210 160 180" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>

    <!-- Output flow to right -->
    <path d="M 700 320 Q 715 330 730 360" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  </g>

  <!-- Title and version info -->
  <g id="header">
    <text x="430" y="25" text-anchor="middle" class="title" font-size="18">Manufacturing Platform Architecture</text>
  </g>

  <!-- Footer info -->
  <g id="footer" opacity="0.5">
    <text x="430" y="465" text-anchor="middle" class="label" font-size="11">Data flows upward through validation layers, outputs flow downward to consumers</text>
  </g>
</svg>