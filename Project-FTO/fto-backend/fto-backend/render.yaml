services:
  - type: web
    name: fto-platform-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ALLOWED_EMAIL_DOMAIN
        value: pmintl.net
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
