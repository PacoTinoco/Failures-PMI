services:
  - type: web
    name: fto-dashboard
    plan: standard
    runtime: node
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma db push --skip-generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXTAUTH_URL
        fromService:
          name: fto-dashboard
          property: url
      - fromGroup: fto_env_vars
        key: DATABASE_URL
      - fromGroup: fto_env_vars
        key: NEXTAUTH_SECRET
    healthCheckPath: /
    numInstances: 1
    autoDeploy: true
    preDeployCommand: npx prisma db push --skip-generate

  - type: pserv
    name: fto-database
    plan: standard
    runtime: postgres
    region: oregon
    version: 15
    databaseName: fto_dashboard
    initialSQL: |
      CREATE SCHEMA IF NOT EXISTS public;

envVarGroups:
  - name: fto_env_vars
    vars:
      - key: DATABASE_URL
        value: postgresql://postgres:${FTO_DB_PASSWORD}@fto-database:5432/fto_dashboard
      - key: NEXTAUTH_SECRET
        generateValue: true
